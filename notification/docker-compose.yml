version: '3.8'

services:
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka-network

  kafka_broker:
    image: bitnami/kafka:latest
    container_name: kafka_broker
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_CFG_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_CFG_ZOOKEEPER_SESSION_TIMEOUT_MS: "18000"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka_broker:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - kafka-network

  notifications-api:
    build: .
    container_name: notifications-api
    depends_on:
      - kafka_broker
    environment:
      PORT: 4000
      BROKER_URL: "kafka_broker:9092"
    ports:
      - "4000:4000"
    networks:
      - kafka-network

  orders-api:
    build: .
    container_name: orders-api
    depends_on:
      - kafka_broker
    environment:
      PORT: 3000
      BROKER_URL: "kafka_broker:9092"
    ports:
      - "3000:3000"
    networks:
      - kafka-network

networks:
  kafka-network:
    driver: bridge