version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://freddy:freddy@db:5434/marketplace?schema=public"

  db:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: freddy
      POSTGRES_USER: freddy
      POSTGRES_DB: marketplace
    ports:
      - "5434:5432"
