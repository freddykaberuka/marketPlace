# docker-compose.yml
version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://freddy:pass@123@db:5432/marketplace?schema=public"

  db:
    image: postgres:latest
    environment:
      POSTGRES_PASSWORD: pass@123
      POSTGRES_USER: freddy
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
