version: '3.8'

services:
  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - auth-service
      - product-service
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:4000
      - PRODUCT_SERVICE_URL=http://product-service:5000
    networks:
      - backend

  # Authentication Service
  auth-service:
    build:
      context: ./auth
      dockerfile: Dockerfile
    env_file: ./auth/.env
    ports:
      - "4000:4000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://freddy:pass@123@auth-db:5432/marketplace_auth?schema=public
    depends_on:
      auth-db:
        condition: service_healthy


    command: [ "sh", "-c", "npx prisma migrate deploy && yarn start" ]
    networks:
      - backend

  # PostgreSQL for Auth Service
  auth-db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=marketplace_auth
      - POSTGRES_PASSWORD=pass@123
      - POSTGRES_USER=freddy
    ports:
      - "5435:5432"  # Map host 5435 to avoid conflict
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "freddy", "-d", "marketplace_auth" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Product Service
  product-service:
    build:
      context: ./product
      dockerfile: Dockerfile
    env_file: ./product/.env
    ports:
      - "5000:5000"
    depends_on:
      product-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://freddy:pass@123@product-db:5432/marketplace?schema=public
    networks:
      - backend

  # PostgreSQL for Product Service
  product-db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=marketplace
      - POSTGRES_PASSWORD=pass@123
      - POSTGRES_USER=freddy
    ports:
      - "5436:5432"  # Map host 5436 to avoid conflict
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "freddy", "-d", "marketplace" ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  backend: