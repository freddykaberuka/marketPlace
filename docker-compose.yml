services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - product-service
    environment:
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - backend

  auth-service:
    build: ./auth
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://freddy:pass@123@auth-db:5432/marketplace_auth?schema=public
    networks:
      - backend
    depends_on:
      - auth-db

  auth-db:
    image: postgres:latest
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
    ports:
      - "5435:5432"
    networks:
      - backend

  product-service:
    build: ./product
    ports:
      - "5000:5000"
    depends_on:
      - product-db
    environment:
      - DATABASE_URL=postgresql://freddy:pass@123@product-db:5432/marketplace?schema=public
    networks:
      - backend

  product-db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=freddy
      - POSTGRES_PASSWORD=pass@123
      - POSTGRES_DB=marketplace
    ports:
      - "5434:5432"
    networks:
      - backend

networks:
  backend:
